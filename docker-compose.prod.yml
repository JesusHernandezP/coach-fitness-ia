# Referencia de produccion — no usar directamente.
# Los servicios postgres y web son gestionados por el proveedor cloud (Render/Railway + Vercel).
# Solo se usa como referencia de configuracion.

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${IMAGE_TAG:-latest}
    environment:
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      SPRING_PROFILES_ACTIVE: prod
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
      APP_DOCS_ENABLED: ${APP_DOCS_ENABLED:-false}
    ports:
      - "8080:8080"
